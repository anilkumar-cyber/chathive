# Example host-level Nginx config for a bare-metal / VPS deployment where the
# client is a static build served directly by Nginx and the API runs under
# PM2 on the same host (packages/server, `pm2 start ecosystem.config.js`).
#
# Install: copy to /etc/nginx/sites-available/nexuschat.conf and symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
# For multi-instance PM2 cluster mode, keep `ip_hash` so Socket.io's polling
# handshake stays pinned to one upstream worker before upgrading.

upstream nexuschat_api {
    ip_hash;
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name nexuschat.example.com;

    # Redirect to HTTPS once a certificate is provisioned (certbot/Let's Encrypt).
    # return 301 https://$host$request_uri;

    root /var/www/nexuschat/client/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://nexuschat_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://nexuschat_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location /api-docs {
        proxy_pass http://nexuschat_api/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
