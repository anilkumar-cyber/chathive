services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: nexuschat
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/nexuschat
      REDIS_URL: redis://redis:6379
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    ports:
      - "${SERVER_PORT_HOST:-5000}:5000"
    deploy:
      resources:
        limits:
          memory: 512M

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SOCKET_URL: /
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT_HOST:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongo_data:
  redis_data:
